openapi: 3.0.3
info:
  title: ODFE Cafe POS - API Gateway
  description: |
    Central API gateway for the ODFE Cafe POS platform.
    This file aggregates all API modules.
  version: 1.0.0
  contact:
    name: ODFE Team

servers:
  - url: http://localhost:3000
    description: Development server

tags:
  - name: Authentication
    description: User authentication endpoints
  - name: Products
    description: Product management endpoints
  - name: Orders
    description: Order management endpoints
  - name: Payments
    description: Payment processing endpoints
  - name: Dashboard
    description: Dashboard analytics endpoints
  - name: System
    description: System health endpoints

paths:
  /health:
    $ref: "./auth.yml#/paths/~1health"

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Error message

    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
